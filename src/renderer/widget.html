<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: transparent;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .widget {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 12px;
      height: 48px;
      transition: background 0.2s, opacity 0.2s;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* ---- Recording state ---- */
    .widget[data-state="recording"] {
      background: rgba(220, 38, 38, 0.88);
      box-shadow: 0 2px 16px rgba(220, 38, 38, 0.4);
    }

    .widget[data-state="stopping"] {
      background: rgba(220, 38, 38, 0.6);
    }

    .widget[data-state="uploading"] {
      background: rgba(30, 30, 40, 0.88);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    }

    .widget[data-state="complete"] {
      background: rgba(22, 163, 74, 0.88);
      box-shadow: 0 2px 12px rgba(22, 163, 74, 0.3);
      cursor: pointer;
      -webkit-app-region: no-drag;
    }

    /* ---- Pulsing dot ---- */
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .widget[data-state="recording"] .dot {
      background: #fff;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .widget[data-state="stopping"] .dot {
      background: rgba(255, 255, 255, 0.5);
      animation: none;
    }

    .widget[data-state="uploading"] .dot {
      background: #60a5fa;
      animation: pulse 2s ease-in-out infinite;
    }

    .widget[data-state="complete"] .dot {
      background: #fff;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* ---- Text ---- */
    .info {
      display: flex;
      flex-direction: column;
      gap: 1px;
      flex: 1;
      min-width: 0;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.95);
      letter-spacing: 0.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .timer {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.7);
      font-variant-numeric: tabular-nums;
    }

    /* ---- Stop button ---- */
    .stop-btn {
      -webkit-app-region: no-drag;
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .stop-btn:hover {
      background: rgba(255, 255, 255, 0.35);
    }

    .stop-btn:active {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(0.95);
    }

    .stop-icon {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      background: #fff;
    }

    /* Hide stop button when not recording */
    .widget:not([data-state="recording"]) .stop-btn {
      display: none;
    }

    /* ---- Open button (for complete state) ---- */
    .open-btn {
      -webkit-app-region: no-drag;
      height: 24px;
      padding: 0 10px;
      border-radius: 6px;
      border: none;
      background: rgba(255, 255, 255, 0.25);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.3px;
      transition: background 0.15s;
    }

    .open-btn:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .widget[data-state="complete"] .open-btn {
      display: flex;
    }
  </style>
</head>
<body>
  <div class="widget" id="widget" data-state="recording">
    <div class="dot"></div>
    <div class="info">
      <div class="label" id="label">Recording</div>
      <div class="timer" id="timer">0:00</div>
    </div>
    <button class="stop-btn" id="stopBtn" title="Stop recording">
      <div class="stop-icon"></div>
    </button>
    <button class="open-btn" id="openBtn">Open</button>
  </div>

  <script>
    const widget = document.getElementById('widget');
    const label = document.getElementById('label');
    const timer = document.getElementById('timer');
    const stopBtn = document.getElementById('stopBtn');
    const openBtn = document.getElementById('openBtn');

    let timerInterval = null;
    let startedAt = null;

    function formatDuration(seconds) {
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function startTimer(startTime) {
      stopTimer();
      startedAt = startTime;
      timerInterval = setInterval(() => {
        const elapsed = (Date.now() - startedAt) / 1000;
        timer.textContent = formatDuration(elapsed);
      }, 200);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function updateState(data) {
      widget.dataset.state = data.state;

      switch (data.state) {
        case 'recording':
          label.textContent = 'Recording';
          if (data.startedAt) {
            startTimer(data.startedAt);
          }
          break;

        case 'stopping':
          label.textContent = 'Saving...';
          stopTimer();
          if (data.duration) {
            timer.textContent = formatDuration(data.duration);
          }
          break;

        case 'uploading':
          label.textContent = 'Uploading';
          stopTimer();
          if (data.duration) {
            timer.textContent = formatDuration(data.duration);
          } else {
            timer.textContent = '';
          }
          break;

        case 'complete':
          label.textContent = 'Ready in Wolfee';
          stopTimer();
          timer.textContent = 'Click to open';
          break;
      }
    }

    // IPC from main process
    if (window.wolfee && window.wolfee.onRecordingState) {
      window.wolfee.onRecordingState(updateState);
    }

    stopBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (window.wolfee && window.wolfee.stopRecording) {
        window.wolfee.stopRecording();
      }
    });

    openBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (window.wolfee && window.wolfee.openMeeting) {
        window.wolfee.openMeeting();
      }
    });

    // Clicking anywhere on the complete widget also opens the meeting
    widget.addEventListener('click', () => {
      if (widget.dataset.state === 'complete' && window.wolfee && window.wolfee.openMeeting) {
        window.wolfee.openMeeting();
      }
    });
  </script>
</body>
</html>
