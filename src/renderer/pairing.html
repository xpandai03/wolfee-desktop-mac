<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Wolfee — Pair Device</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
    }
    .container {
      text-align: center;
      padding: 32px;
      -webkit-app-region: no-drag;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }
    p {
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      font-size: 24px;
      text-align: center;
      letter-spacing: 8px;
      background: #16213e;
      border: 2px solid #333;
      border-radius: 8px;
      color: #fff;
      outline: none;
      font-family: 'SF Mono', 'Menlo', monospace;
    }
    input:focus { border-color: #6c63ff; }
    input::placeholder {
      letter-spacing: 2px;
      font-size: 14px;
      color: #555;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 16px;
      font-size: 15px;
      font-weight: 600;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #5a52d5; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      margin-top: 12px;
      font-size: 13px;
      min-height: 20px;
    }
    .status.error { color: #ff6b6b; }
    .status.success { color: #51cf66; }
    .link {
      display: block;
      margin-top: 16px;
      font-size: 12px;
      color: #6c63ff;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      width: auto;
      padding: 0;
    }
    .link:hover { color: #8b83ff; }
    .skip {
      margin-top: 8px;
      font-size: 12px;
      color: #555;
      cursor: pointer;
      background: none;
      border: none;
      width: auto;
      padding: 0;
    }
    .skip:hover { color: #888; }
    .version {
      position: fixed;
      bottom: 8px;
      right: 12px;
      font-size: 10px;
      color: #444;
      font-family: 'SF Mono', 'Menlo', monospace;
      -webkit-app-region: no-drag;
    }
    .debug {
      position: fixed;
      bottom: 8px;
      left: 12px;
      font-size: 10px;
      color: #444;
      font-family: 'SF Mono', 'Menlo', monospace;
      -webkit-app-region: no-drag;
      max-width: 60%;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pair with Wolfee</h1>
    <p>Enter the 6-digit code from your Wolfee dashboard</p>
    <input type="text" id="code" maxlength="6" placeholder="000000" autofocus>
    <button id="pair" disabled>Connect</button>
    <div class="status" id="status"></div>
    <button class="link" id="openDashboard">Open Wolfee Dashboard to get code</button>
    <button class="skip" id="skip">Skip for now</button>
  </div>
  <div class="debug" id="debugLabel"></div>
  <div class="version" id="versionLabel"></div>
  <script>
    const codeInput = document.getElementById('code');
    const pairBtn = document.getElementById('pair');
    const status = document.getElementById('status');
    const skipBtn = document.getElementById('skip');
    const dashboardBtn = document.getElementById('openDashboard');
    const debugLabel = document.getElementById('debugLabel');

    // ── Debug: visible in UI since console isn't visible in packaged builds ──
    function dbg(msg) {
      console.log('[Renderer] ' + msg);
      if (debugLabel) debugLabel.textContent = msg;
    }

    dbg('script loaded');

    // ── Step 1: Verify bridge ──
    const bridge = window.wolfee;
    if (!bridge) {
      dbg('FATAL: no bridge');
      status.className = 'status error';
      status.textContent = 'App error: preload bridge missing. Restart the app.';
      pairBtn.disabled = true;
      codeInput.disabled = true;
    } else {
      dbg('bridge OK');
    }

    // ── Step 2: Input — update button on ANY change ──
    function syncButtonState() {
      const len = codeInput.value.length;
      const shouldEnable = len >= 6 && !!bridge;
      pairBtn.disabled = !shouldEnable;
      dbg('len=' + len + ' btn=' + (shouldEnable ? 'ON' : 'off'));
    }

    codeInput.addEventListener('input', () => {
      codeInput.value = codeInput.value.replace(/[^0-9a-zA-Z]/g, '').toUpperCase();
      syncButtonState();
    });

    // Belt and suspenders — also check on keyup and paste
    codeInput.addEventListener('keyup', syncButtonState);
    codeInput.addEventListener('paste', () => setTimeout(syncButtonState, 0));

    // ── Step 3: Connect button ──
    pairBtn.addEventListener('click', async () => {
      dbg('CLICK');

      if (!bridge) {
        dbg('no bridge');
        status.className = 'status error';
        status.textContent = 'Preload bridge missing. Restart the app.';
        return;
      }

      const code = codeInput.value.trim();
      dbg('code=' + code);

      if (code.length < 6) {
        dbg('too short');
        return;
      }

      // Lock UI
      pairBtn.disabled = true;
      pairBtn.textContent = 'Connecting...';
      status.className = 'status';
      status.textContent = '';

      dbg('INVOKE...');

      try {
        const result = await bridge.pairWithCode(code);
        dbg('RESULT: ' + JSON.stringify(result));

        if (result && result.success) {
          status.className = 'status success';
          status.textContent = 'Paired successfully!';
          pairBtn.textContent = 'Connected';
        } else {
          status.className = 'status error';
          status.textContent = (result && result.error) || 'Pairing failed.';
          pairBtn.disabled = false;
          pairBtn.textContent = 'Connect';
        }
      } catch (err) {
        dbg('ERROR: ' + (err && err.message || err));
        status.className = 'status error';
        status.textContent = 'IPC error: ' + (err && err.message || 'unknown');
        pairBtn.disabled = false;
        pairBtn.textContent = 'Connect';
      }
    });

    codeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !pairBtn.disabled) pairBtn.click();
    });

    skipBtn.addEventListener('click', () => {
      dbg('skip');
      if (bridge) bridge.skipPairing();
    });

    dashboardBtn.addEventListener('click', async () => {
      if (!bridge) return;
      try {
        const baseUrl = await bridge.getBackendUrl();
        bridge.openExternal(baseUrl + '/dashboard');
      } catch {}
    });

    // ── Version label — shows exact build so we can verify which binary is running ──
    if (bridge) {
      bridge.getAppInfo().then((info) => {
        const tag = info.isPackaged ? '' : ' DEV';
        const bid = info.buildId ? ' (' + info.buildId + ')' : '';
        document.getElementById('versionLabel').textContent = 'v' + info.version + tag + bid;
        dbg('v' + info.version + bid);
      }).catch(() => {});
    }

    dbg('init done');
  </script>
</body>
</html>
